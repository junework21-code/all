<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>dt016 / ltest 로드</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 2rem; background: #eef2ff; color: #111; }
    #wrapper { max-width: 900px; margin: auto; }
    header { margin-bottom: 1.5rem; }
    header h1 { margin: 0 0 0.5rem 0; }
    #content { min-height: 240px; background: #fff; border: 1px solid #cbd5e1; border-radius: 12px; padding: 1.5rem; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <div id="wrapper">
    <header>
      <h1>dt016 index</h1>
      <p>루트의 <code>ltest.html</code> 파일을 읽어서 이곳에 표시합니다.</p>
    </header>
    <section id="content">로딩 중...</section>
  </div>
  <script>
    const target = document.getElementById('content');
    fetch('../ltest.html')
      .then(response => {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.text();
      })
      .then(html => {
        target.innerHTML = html;
      })
      .catch(error => {
        target.innerHTML = '<p class="error">ltest.html 로드 실패: ' + error.message + '</p>';
      });
  </script>
</body>
</html>
