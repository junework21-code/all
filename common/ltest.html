    <script>
      const applyBtn = document.getElementById('applyBtn');
      const docHeader = document.getElementById('docHeader');
      const docBody = document.getElementById('docBody');

      // --- Bid Interceptor ---
      let _fetchOriginal = null;

      function teardownBidInterceptor() {
        if (_fetchOriginal) {
          window.fetch = _fetchOriginal;
          _fetchOriginal = null;
        }
      }

      function setupBidInterceptor(sspBaseUrl) {
        teardownBidInterceptor();
        let sspHostname;
        try { sspHostname = new URL(sspBaseUrl).hostname; } catch (e) { return; }

        const reqPre = document.getElementById('bidRequestPre');
        const resPre = document.getElementById('bidResponsePre');
        reqPre.textContent = '요청 대기 중...';
        resPre.textContent = '응답 대기 중...';

        _fetchOriginal = window.fetch.bind(window);

        window.fetch = async function(input, init, ...rest) {
          const url = input instanceof Request ? input.url : String(input);
          let isTarget = false;
          try { isTarget = new URL(url).hostname === sspHostname; } catch (e) {}

          if (isTarget) {
            // Capture BidRequest body
            if (init && init.body != null) {
              try {
                let bodyStr = typeof init.body === 'string' ? init.body
                  : init.body instanceof ArrayBuffer ? new TextDecoder().decode(init.body)
                  : init.body instanceof Blob ? await init.body.text()
                  : JSON.stringify(init.body);
                try { reqPre.textContent = JSON.stringify(JSON.parse(bodyStr), null, 2); }
                catch { reqPre.textContent = bodyStr; }
              } catch (e) { reqPre.textContent = '요청 본문을 읽을 수 없습니다.'; }
            } else if (input instanceof Request) {
              try {
                const cloned = input.clone();
                const bodyStr = await cloned.text();
                try { reqPre.textContent = JSON.stringify(JSON.parse(bodyStr), null, 2); }
                catch { reqPre.textContent = bodyStr; }
              } catch (e) { reqPre.textContent = '요청 본문을 읽을 수 없습니다.'; }
            }

            const response = await _fetchOriginal(input, init, ...rest);
            const cloned = response.clone();
            try {
              const respStr = await cloned.text();
              try { resPre.textContent = JSON.stringify(JSON.parse(respStr), null, 2); }
              catch { resPre.textContent = respStr || '(응답 없음)'; }
            } catch (e) { resPre.textContent = '응답 본문을 읽을 수 없습니다.'; }
            return response;
          }

          return _fetchOriginal(input, init, ...rest);
        };
      }

      function ensureScriptInHead(scriptHtml) {
          return new Promise((resolve) => {
            try {
              const div = document.createElement('div');
              div.innerHTML = scriptHtml;
              const script = div.querySelector('script');
              if (script && script.src) {
                const newSrc = script.src;
                const existing = document.querySelector('script[data-lina-loader]');
                if (existing) existing.remove();

                try {
                  const scripts = Array.from(document.querySelectorAll('script[src]'));
                  scripts.forEach((sc) => {
                    try {
                      const sSrc = sc.src || '';
                      if (/script(\.min)?\.js(\?|$)/i.test(sSrc) || /loader(\.min)?\.js(\?|$)/i.test(sSrc)) {
                        sc.remove();
                      }
                    } catch (e) { /* ignore per-script errors */ }
                  });
                } catch (e) { /* ignore */ }

                let url;
                try {
                  url = new URL(newSrc, window.location.href);
                } catch (e) {
                  url = { toString: () => newSrc, searchParams: { set: () => {} } };
                }
                if (url.searchParams) url.searchParams.set('_cb', Date.now().toString());

                const s = document.createElement('script');
                s.src = url.toString();
                s.setAttribute('data-lina-loader', '');
                s.async = false;
                s.addEventListener('load', () => resolve());
                s.addEventListener('error', () => resolve());
                document.head.appendChild(s);
                setTimeout(() => {}, 0);
                return;
              }
            } catch (e) { /* ignore parse errors */ }
            resolve();
        });
      }

      function replaceSspUrlInPublisherSetup(bodyHtml, sspUrl) {
        try {
          return bodyHtml.replace(/publisherSetup=('|\")([\s\S]*?)(\1)/, (m, q, jsonStr) => {
            let cleaned = jsonStr.replace(/\\'/g, "'");
            try {
              const obj = JSON.parse(cleaned);
              // Only overwrite sspUrl when a non-empty value is provided
              if (sspUrl) obj.sspUrl = sspUrl;
              const newJson = JSON.stringify(obj);
              return `publisherSetup=${q}${newJson}${q}`;
            } catch (e) {
              return m;
            }
          });
        } catch (e) { return bodyHtml; }
      }

      // Extract sspUrl from publisherSetup attribute inside a lina-ads block in docBody
      function extractPublisherSspFromDocBody(bodyHtml) {
        try {
          const m = bodyHtml.match(/publisherSetup=(['"])([\s\S]*?)\1/);
          if (!m) return '';
          const jsonStr = m[2].replace(/\\'/g, "'");
          const obj = JSON.parse(jsonStr);
          return obj && obj.sspUrl ? obj.sspUrl : '';
        } catch (e) { return ''; }
      }

      function waitForCustomElement(tagName, timeout = 5000) {
        if (window.customElements && window.customElements.get(tagName)) return Promise.resolve();
        if (window.customElements && window.customElements.whenDefined) {
          return Promise.race([
            window.customElements.whenDefined(tagName),
            new Promise((res) => setTimeout(res, timeout)),
          ]);
        }
        return new Promise((resolve) => {
          const start = Date.now();
          const iv = setInterval(() => {
            if (window.customElements && window.customElements.get(tagName)) {
              clearInterval(iv); resolve();
            }
            if (Date.now() - start > timeout) { clearInterval(iv); resolve(); }
          }, 50);
        });
      }

        const body = docBody.value;

        const existingPubMatch = body.match(/publisherSetup=(['"])([\s\S]*?)\1/);
        const existingAdMatch = body.match(/adConfig=(['"])([\s\S]*?)\1/);
        const existingPointMatch = body.match(/pointBtnUrl=(['"])([\s\S]*?)\1/);

        let existingPub = {};
        if (existingPubMatch) { try { existingPub = JSON.parse(existingPubMatch[2]); } catch (e) { existingPub = {}; } }

        let existingAd = {};
        if (existingAdMatch) { try { existingAd = JSON.parse(existingAdMatch[2]); } catch (e) { existingAd = {}; } }

        const existingPoint = existingPointMatch ? existingPointMatch[2] : '';

        // merge existing userInfo with inputs
        const firstMatch = body.match(/userInfo=(['"])([\s\S]*?)\1/);
        let existingUser = {};
        if (firstMatch) { try { existingUser = JSON.parse(firstMatch[2]); } catch (e) { existingUser = {}; } }
        const mergedUser = Object.assign({}, existingUser, userInfoObj);

        docBody.value = normalizeAndBuildLinaAds(body, mergedUser, existingPub, existingAd, existingPoint);
      }

      // Update lina-related attributes inside docBody (publisherSetup, adConfig, pointBtnUrl)
      function updateDocBodyLinaSettings() {
        const appKey = document.getElementById('linaAppKey').value.trim();
        const ssp = document.getElementById('linaSspInput').value.trim();
        const adDisplayId = document.getElementById('linaAdDisplayId').value.trim();
        const pointUrl = document.getElementById('linaPointBtnUrl').value.trim();
        // Use normalized replacement to keep the exact format and update values
        const body = docBody.value;
        // parse existing attrs
        const existingUserMatch = body.match(/userInfo=(['"])([\s\S]*?)\1/);
        const existingPubMatch = body.match(/publisherSetup=(['"])([\s\S]*?)\1/);
        const existingAdMatch = body.match(/adConfig=(['"])([\s\S]*?)\1/);
        const existingPointMatch = body.match(/pointBtnUrl=(['"])([\s\S]*?)\1/);

        let publisherObj = {};
        if (existingPubMatch) {
          try { publisherObj = JSON.parse(existingPubMatch[2]); } catch (e) { publisherObj = {}; }
        }
        if (appKey) publisherObj.appKey = appKey;
        if (ssp) publisherObj.sspUrl = ssp;

        let adObj = {};
        if (existingAdMatch) {
          try { adObj = JSON.parse(existingAdMatch[2]); } catch (e) { adObj = {}; }
        }
        if (adDisplayId) adObj.adDisplayId = adDisplayId;

        const pointBtn = pointUrl || (existingPointMatch ? existingPointMatch[2] : '');

        // determine existing userInfo to preserve other fields
        let existingUser = {};
        if (existingUserMatch) {
          try { existingUser = JSON.parse(existingUserMatch[2]); } catch (e) { existingUser = {}; }
        }
        const mergedUser = Object.assign({}, existingUser, { wallet_address: existingUser.wallet_address || userInfoObjFromInputs().wallet_address });

        const mergedUserFinal = Object.assign({}, mergedUser);
        // but apply explicit values from form
        mergedUserFinal.wallet_address = document.getElementById('walletInput').value.trim() || mergedUserFinal.wallet_address || '0x1234abcd';

      // Build a normalized <lina-ads> block and replace the first occurrence
      function normalizeAndBuildLinaAds(body, userObj, publisherObj, adObj, pointBtnUrl) {
        const userJson = JSON.stringify(userObj);
        const pubJson = JSON.stringify(publisherObj || {});
        const adJson = JSON.stringify(adObj || {});
        const pointVal = pointBtnUrl || '';

        const block = `<lina-ads\n    userInfo='${userJson}'\n    publisherSetup='${pubJson}'\n    adConfig='${adJson}'\n    pointBtnUrl="${pointVal}"\n    >\n</lina-ads>`;

        if (/<lina-ads\b[\s\S]*?<\/lina-ads>/.test(body)) {
          return body.replace(/<lina-ads\b[\s\S]*?<\/lina-ads>/, block);
        }
        // if not found, prepend
        return block + '\n' + body;
      }

      async function lookupLedgerBalance() {
        const issuer = document.getElementById('issuerInput').value.trim();
        const holder = document.getElementById('holderInput').value.trim();
        const keyId = document.getElementById('keyIdInput').value.trim();
        const pem = document.getElementById('pemInput').value.trim();
        const out = document.getElementById('balanceOutput');
        if (!issuer || !holder || !keyId || !pem) {
          setLedgerTrafficLight('red', '모든 필드를 확인하세요.');
          if (out) out.textContent = '';
          return;
        }
        setLedgerTrafficLight('', '조회 중...');
        if (out) out.textContent = '';
        try {
          // dynamic import of jose for browser
          const jose = await import('https://cdn.jsdelivr.net/npm/jose@4.14.4/dist/browser/index.min.js');
          const { SignJWT, importPKCS8 } = jose;
          const privateKey = await importPKCS8(pem, 'ES256');
          const now = Math.floor(Date.now() / 1000);
          const jwt = await new SignJWT({ iss: issuer, aud: 'lina-point-ledger', iat: now, exp: now + 300 })
            .setProtectedHeader({ alg: 'ES256', kid: keyId })
            .sign(privateKey);

          const envVal = (document.querySelector('input[name="env"]:checked') || { value: localStorage.getItem('lina2.saved.env') || 'dev' }).value;
          const BASE_URL = envVal === 'stg' ? 'https://pl-api.stg.web3lge.com' : 'https://pl-api.dev.web3lge.com';
          const url = `${BASE_URL}/v1/holders/${encodeURIComponent(holder)}/balance`;
          const res = await fetch(url, { headers: { Authorization: `Bearer ${jwt}` } });
          if (res.status === 404) {
            // 신규 유저로 간주: 조회 성공(밸런스 0)
            if (out) out.textContent = '0';
            setLedgerTrafficLight('green', '조회 성공 (신규 유저)');
            return;
          }
          if (!res.ok) throw new Error(`조회 실패: ${res.status} ${res.statusText}`);
          const data = await res.json();

          // Try to extract balance value from common response shapes
          let balance = null;
          try {
            if (data == null) balance = null;
            else if (typeof data === 'number' || typeof data === 'string') balance = data;
            else if ('balance' in data) balance = data.balance;
            else if ('balanceResponse' in data) balance = data.balanceResponse;
            else if (data.data && 'balance' in data.data) balance = data.data.balance;
            else if (Array.isArray(data.balances) && data.balances.length > 0) {
              const b0 = data.balances[0];
              balance = (b0 && (b0.balance || b0.amount || b0.value)) || b0;
            }
          } catch (e) { balance = null; }

          if (out) out.textContent = (balance !== null && balance !== undefined) ? String(balance) : (JSON.stringify(data) || '');
          setLedgerTrafficLight('green', '조회 성공');
        } catch (e) {
          if (out) out.textContent = '';
          setLedgerTrafficLight('red', e && e.message ? e.message : '오류');
        }
      }

      function parseOpt1(val) {
        const [genderRaw, ageRange] = val.split('/');
        let gender = genderRaw;
        if (typeof genderRaw === 'string') {
          const g = genderRaw.trim().toLowerCase();
          if (g.startsWith('m')) gender = 'M';
          else if (g.startsWith('f')) gender = 'F';
        }
        const currentYear = new Date().getFullYear();
        let firstAge;
        if (ageRange && ageRange.startsWith('over')) {
          firstAge = parseInt(ageRange.replace('over', ''), 10);
        } else if (ageRange && ageRange.includes('-')) {
          firstAge = parseInt(ageRange.split('-')[0], 10);
        } else {
          firstAge = parseInt(ageRange, 10) || 30;
        }
        return { gender, yob: currentYear - firstAge };
      }

          const bodyStg = '<lina-ads\n    userInfo=\'{"wallet_address":"0x1234abcd","nullifier_hash_orb":"test-nullifier","userOrbVerified":true}\'\n    publisherSetup=\'{"appKey":"your-app-key","sspUrl":"https://ssp-api.stg.web3lge.com"}\'\n    adConfig=\'{"adDisplayId":"718ec268-8096-49a3-bd79-36ac7af34818"}\'\n    pointBtnUrl="your-pointbutton-url"\n    >\n</lina-ads>';

          // Clear inputs
          const nf = document.getElementById('nullifierInput'); if (nf) nf.value = '';
          const wa = document.getElementById('walletInput'); if (wa) wa.value = '';
          const hv = document.getElementById('humanVerified'); if (hv) hv.value = 'Y';
          const o1 = document.getElementById('opt1'); if (o1) o1.selectedIndex = 0;
          const o2 = document.getElementById('opt2'); if (o2) o2.selectedIndex = 0;

          const lap = document.getElementById('linaAppKey'); if (lap) lap.value = '';
          const lsp = document.getElementById('linaSspInput'); if (lsp) lsp.value = '';
          const lad = document.getElementById('linaAdDisplayId'); if (lad) lad.value = '';
          const lpt = document.getElementById('linaPointBtnUrl'); if (lpt) lpt.value = '';

          // Reset doc header/body according to env
          if (sel === 'stg') {
            if (docHeader) docHeader.value = headerStg;
            if (docBody) docBody.value = bodyStg;
          } else {
            if (docHeader) docHeader.value = headerDev;
            if (docBody) docBody.value = bodyDev;
          }

          // Clear localStorage keys used by this page
          const keys = ['lina2.saved.header','lina2.saved.body','lina2.saved.ssp','lina2.saved.nullifier','lina2.saved.wallet','lina2.saved.humanVerified','lina2.saved.opt1','lina2.saved.opt2','lina2.saved.appKey','lina2.saved.linaSsp','lina2.saved.adDisplayId','lina2.saved.pointBtnUrl','lina2.doReload'];
          keys.forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });

          // Persist selected env marker
          try { localStorage.setItem('lina2.saved.env', sel); } catch (e) {}

          // Ensure radio reflects selection
          const radio = document.querySelector(`input[name="env"][value="${sel}"]`); if (radio) radio.checked = true;

          try { applyEnvironment(sel); } catch (e) { /* ignore */ }

          // Clear status lights
          setTrafficLight('', '');
          setLinaTrafficLight('', '');

          // Apply to render area so user sees reset content
          //applySettings();
        } catch (e) { console.error('resetAllSettings error', e); }
      }

      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('설정값과 로컬 저장을 모두 초기화하시겠습니까?')) return;
        resetAllSettings();
      });
    </script>
